name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # ম্যানুয়ালি রান করতে চাইলে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      working-directory: examples/llama.android
      run: chmod +x gradlew

    - name: Build with Gradle (Debug APK)
      working-directory: examples/llama.android
      run: ./gradlew assembleDebug

    - name: Build with Gradle (Release APK)  # Optional - signing ছাড়া unsigned হবে
      working-directory: examples/llama.android
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: examples/llama.android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK (unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned.apk
        path: examples/llama.android/app/build/outputs/apk/release/app-release-unsigned.apk